services:
  - type: web
    name: agent-council-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run db:push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
